[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js-na2.hs-scripts.com https://ddwl4m2hdecbv.cloudfront.net;
      script-src-elem 'self' 'unsafe-inline' https://js-na2.hs-scripts.com https://ddwl4m2hdecbv.cloudfront.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: https: blob:;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self' https: wss:;
      frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://meetings-na2.hubspot.com https://*.hubspot.com;
      media-src 'self' https: blob:;
      frame-ancestors 'self';
      form-action 'self';
      upgrade-insecure-requests;
      """
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), screen-wake-lock=(), ambient-light-sensor=(), accelerometer=(), gyroscope=(), magnetometer=(), midi=(), sync-xhr=(), autoplay=(), encrypted-media=(), picture-in-picture=(), fullscreen=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "inject-meta"
  path = "/insights/*"

[dev]
  targetPort = 3000
  framework = "vite"

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[context.development]
  [context.development.environment]
    NODE_ENV = "development"